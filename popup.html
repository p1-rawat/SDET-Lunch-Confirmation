<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunch Confirmation</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <img src="SDETlogo.png" width="200">

    <h4 class="heading-lunch"> Lunch Confirmation </h4>

    <div id="menu-container"></div>

    <div class="container mt-3">
        <div class="input-group">
            <span class="input-group-text" id="basic-addon1">@</span>
            <input id="empId" type="text" class="form-control" placeholder="Enter Employee Code"
                aria-label="Employee ID" aria-describedby="basic-addon1" required />
        </div>
    </div>

    <button id="startBtn"> Start </button>

    <div id="status"></div>


    <script src="script.js"></script>
    <script src="menu.js"></script>

</body>

</html>
